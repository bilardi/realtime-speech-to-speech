# run "pre-commit install" once after clone to register the git-hook in .git/hooks/pre-commit
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest .
        language: system
        pass_filenames: false
        always_run: true
